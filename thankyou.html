<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You — Luxe Beauty Trip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="styles.css">
  <style>
    .thankyou-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 60px 24px;
      background: #fdf9f8;
    }
    .thankyou-logo {
      height: 52px;
      width: auto;
      margin-bottom: 40px;
    }
    .thankyou-icon {
      width: 64px;
      height: 64px;
      background: rgba(212,131,122,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
      font-size: 1.6rem;
    }
    .thankyou-wrap h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-style: italic;
      color: var(--navy);
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .thankyou-wrap p {
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      color: #666;
      line-height: 1.75;
      max-width: 440px;
      margin: 0 auto 36px;
    }
    .thankyou-links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div class="thankyou-wrap">
    <img src="images/logo.png" alt="Luxe Beauty Trip" class="thankyou-logo">
    <div class="thankyou-icon">✦</div>
    <h1>We'll be in touch soon.</h1>
    <p>Thank you for reaching out. We've received your details and will be in touch as soon as possible to schedule your free discovery call.</p>
    <div class="thankyou-links">
      <a href="index.html" class="btn btn-rose">Back to Home</a>
      <a href="seoul-group-trip.html" class="btn" style="background:#f5efeb; color:var(--navy);">View the Seoul Retreat</a>
    </div>
  </div>
</body>
</html>
